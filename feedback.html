<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status do Pagamento | Ze Chips</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .feedback-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
            background: radial-gradient(circle at top right, rgba(255, 152, 0, 0.05), transparent 60%);
        }
        .feedback-card {
            max-width: 500px;
            width: 100%;
            padding: 3rem 2.5rem;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            animation: slideUp 0.5s ease-out forwards;
        }
        .icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
        }
        .title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }
        .success-color { color: #4caf50; }
        .pending-color { color: #ff9800; }
        .failure-color { color: #f44336; }
    </style>
</head>
<body>
    <div class="feedback-container">
        <div class="feedback-card">
            <div id="status-icon" class="icon">⌛</div>
            <h1 id="status-title" class="title">Processando...</h1>
            <p id="status-desc" style="color: var(--text-muted); margin-bottom: 2rem; line-height: 1.6; font-size: 0.95rem;">
                Aguarde um momento enquanto confirmamos o seu pagamento.
            </p>
            <div style="background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 16px; padding: 1.5rem; margin-bottom: 2rem;">
                <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 800;">Código do Pedido</div>
                <div id="order-code-display" style="font-size: 2rem; font-weight: 900; color: white; margin-top: 0.5rem; letter-spacing: 2px;">#----</div>
            </div>
            <button class="checkout-btn" onclick="goToMyOrders()" style="width: 100%; margin-top: 0;">Ver Meus Pedidos</button>
        </div>
    </div>

    <script>
        // Obter parâmetros da URL
        const params = new URLSearchParams(window.location.search);
        const status = params.get('status') || 'pending';
        const code = params.get('code') || '#----';

        document.getElementById('order-code-display').innerText = code;

        const iconEl = document.getElementById('status-icon');
        const titleEl = document.getElementById('status-title');
        const descEl = document.getElementById('status-desc');

        if (status === 'success') {
            iconEl.innerText = '✅';
            titleEl.innerText = 'Pagamento Aprovado!';
            titleEl.className = 'title success-color';
            descEl.innerText = 'Seu pagamento foi aprovado pelo Mercado Pago! Seu pedido foi enviado para a cozinha e em breve começará a ser preparado. Obrigado pela preferência!';
        } else if (status === 'failure') {
            iconEl.innerText = '❌';
            titleEl.innerText = 'Pagamento Recusado';
            titleEl.className = 'title failure-color';
            descEl.innerText = 'Infelizmente o seu pagamento não foi aprovado pelo Mercado Pago. Você pode tentar realizar o pagamento novamente acessando a área "Meus Pedidos".';
        } else {
            // Pending
            iconEl.innerText = '⚠️';
            titleEl.innerText = 'Pagamento Pendente';
            titleEl.className = 'title pending-color';
            descEl.innerText = 'Seu pagamento está em processamento pelo Mercado Pago. Assim que for aprovado, seu pedido será enviado para a produção automaticamente.';
        }

        function goToMyOrders() {
            // Retorna para a aba de meus pedidos no index.html
            // Para isso, podemos salvar no localStorage para o app.js ler e trocar de aba
            localStorage.setItem('ze_chips_last_view', 'my-orders');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
